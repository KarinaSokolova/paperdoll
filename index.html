<meta name="apple-mobile-web-app-title" content="Paper Doll">

<title>Paper Doll</title>

  body {
    background: #faf6f1;
    font-family: 'Caveat', cursive;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .page-title {
    text-align: center;
    padding: 16px 0 2px;
  }
  .page-title h1 {
    font-family: 'Caveat', cursive;
    font-size: 2.4rem;
    font-weight: 700;
    color: #3a3530;
  }
  .page-title p {
    font-family: 'Kalam', cursive;
    font-size: 0.92rem;
    color: #a09080;
  }
  
  .main-layout {
    display: flex;
    max-width: 1100px;
    margin: 8px auto 0;
    padding: 0 15px;
    gap: 24px;
  }
  
  .doll-panel {
    flex: 0 0 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  .doll-canvas {
    position: relative;
    width: 240px;
    height: 570px;
  }
  .doll-canvas svg, .doll-canvas .layer-svg {
    position: absolute;
    top: 0; left: 0;
    width: 240px;
    height: 570px;
    pointer-events: none;
  }
  
  .controls {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .btn {
    padding: 7px 22px;
    border: 2px solid #c7a88a;
    background: white;
    border-radius: 20px;
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: #6a5a4a;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: #c7a88a; color: white; }
  
  .wardrobe-panel { flex: 1; min-width: 0; }
  
  .category-label {
    font-family: 'Caveat', cursive;
    font-size: 1.35rem;
    color: #8a7a6a;
    font-weight: 600;
    margin: 10px 0 5px;
    padding-left: 4px;
    border-bottom: 1.5px dashed #d8cec2;
    padding-bottom: 2px;
  }
  .category-label:first-child { margin-top: 0; }
  
  .items-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .item-card {
    background: white;
    border: 2px solid #e8e0d6;
    border-radius: 14px;
    padding: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .item-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(120,100,80,0.12);
    border-color: #c7a88a;
  }
  .item-card.worn {
    border-color: #c75b3a;
    background: #fff8f4;
    box-shadow: 0 3px 12px rgba(199,91,58,0.15);
  }
  .item-card.worn::after {
    content: '✓';
    position: absolute;
    top: -6px; right: -6px;
    width: 20px; height: 20px;
    background: #c75b3a;
    color: white;
    border-radius: 50%;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }
  .item-card .name {
    font-family: 'Kalam', cursive;
    font-size: 0.78rem;
    color: #7a6a5a;
    margin-top: 3px;
    text-align: center;
    line-height: 1.1;
  }
  
  @media (max-width: 680px) {
    .main-layout { flex-direction: column; align-items: center; }
    .wardrobe-panel { width: 100%; max-width: 400px; }
    .items-row { justify-content: center; }
  }
</style>
</head>

// ══════════════════════════════════════
// STATE & RENDERING
// ══════════════════════════════════════
const worn = {};

function render() {
  const canvas = document.getElementById('dollCanvas');
  // Layer order: shoes first, then tops, then bottoms over tops, outerwear on top, accessories last
  const layerOrder = ['Shoes','Tops','Bottoms','Outerwear','Accessories'];
  const accOrder = ['taupe-scarf','black-sunnies','blue-bag','red-puzzle','black-crossbody'];

  let layerHTML = '';
  layerOrder.forEach(cat => {
    if (cat === 'Accessories') {
      accOrder.forEach(aid => {
        if (Object.values(worn).includes(aid)) {
          const it = items.find(i => i.id === aid);
          layerHTML += `<div class="layer-svg"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 570" width="240" height="570">${DEFS}${it.layer}</svg></div>`;
        }
      });
    } else if (worn[cat]) {
      const it = items.find(i => i.id === worn[cat]);
      if (it) layerHTML += `<div class="layer-svg"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 570" width="240" height="570">${DEFS}${it.layer}</svg></div>`;
    }
  });
  canvas.innerHTML = BASE_DOLL + layerHTML;

  const panel = document.getElementById('wardrobePanel');
  const cats = ['Tops','Outerwear','Bottoms','Shoes','Accessories'];
  let html = '';
  cats.forEach(cat => {
    const catItems = items.filter(i => i.cat === cat);
    if (catItems.length === 0) return;
    html += `<div class="category-label">${cat}</div><div class="items-row">`;
    catItems.forEach(it => {
      const isWorn = (cat === 'Accessories') ? Object.values(worn).includes(it.id) : worn[cat] === it.id;
      html += `<div class="item-card ${isWorn ? 'worn' : ''}" onclick="toggle('${it.id}','${cat}')">
        ${it.thumb}<div class="name">${it.label}</div></div>`;
    });
    html += '</div>';
  });
  panel.innerHTML = html;
}

function toggle(id, cat) {
  if (cat === 'Accessories') {
    if (worn[id]) delete worn[id]; else worn[id] = id;
  } else {
    if (worn[cat] === id) delete worn[cat]; else worn[cat] = id;
  }
  render();
}

function clearAll() {
  Object.keys(worn).forEach(k => delete worn[k]);
  render();
}

render();

// Register PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
